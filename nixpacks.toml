[providers]
  node = {}

[phases.setup]
  # Instala as dependências de sistema no Ubuntu (Nixpacks) para o Puppeteer
  aptPkgs = ["wget", "gnupg", "ca-certificates", "libnss3", "libnspr4", "libatk1.0-0", "libatk-bridge2.0-0", "libcups2", "libdrm2", "libxkbcommon0", "libxcomposite1", "libxdamage1", "libxfixes3", "libxrandr2", "libgbm1", "libasound2", "libpango-1.0-0", "libcairo2"]
  cmds = [
    "wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | apt-key add -",
    "sh -c 'echo \"deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main\" >> /etc/apt/sources.list.d/google.list'",
    "apt-get update",
    "apt-get install -y google-chrome-stable"
  ]

[phases.build]
  cmds = ["npm install", "npm run build"]

[start]
  cmd = "npm start"
